name = "birdeye_lab"
description = "Compares Birdeye meme-list discovery shapes via the repo lab script with source-specific runs and Helius-backed grading."
nickname_candidates = ["Birdeye Lab", "Discovery Inspector", "Meme List Probe"]
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
developer_instructions = """
Use the repo discovery-lab script for any Birdeye meme-list comparison instead of ad hoc curls.
Default to source-specific runs (pump-first), then enrich grading with Helius.
Write outputs only under trading_bot/backend/discovery-lab/ or notes/investigations/.
Summarise findings as a short comparison table (source, count, top score, notes) before suggesting strategy edits.
Do not call live trading endpoints or alter strategy config.
"""

[agents]
max_depth = 1

[[skills.config]]
path = ".agents/skills/birdeye-discovery-lab"
enabled = true

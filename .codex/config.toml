approval_policy = "never"
experimental_windows_sandbox = false
model = "gpt-5.4"
model_reasoning_effort = "medium"
project_doc_fallback_filenames = ["AGENTS.md"]
project_root_markers = [
    ".git",
]
web_search = "cached"

[features]
runtime_metrics = true

[agents]
max_depth = 1
max_threads = 3

[mcp_servers.browsermcp]
args = ["-y", "@browsermcp/mcp"]
command = "npx"
required = false
startup_timeout_ms = 20000
tool_timeout_sec = 90

[mcp_servers.birdeye-mcp]
args = [".codex/scripts/start-birdeye-mcp.cjs"]
command = "node"
enabled = true
required = false
startup_timeout_ms = 30000
tool_timeout_sec = 45

[mcp_servers.chrome_devtools]
args = [
    "-y",
    "chrome-devtools-mcp@latest",
]
command = "npx"
required = false
startup_timeout_ms = 20000
tool_timeout_sec = 90

[mcp_servers.desktop_commander]
args = [
    "-y",
    "@wonderwhy-er/desktop-commander@latest",
    "--no-onboarding",
]
command = "npx"
required = true
startup_timeout_ms = 30000
tool_timeout_sec = 120

[mcp_servers.fetch]
args = ["mcp-server-fetch"]
command = "uvx"
required = true
startup_timeout_ms = 20000

[mcp_servers.github]
args = [
    "run",
    "-i",
    "--rm",
    "-e",
    "GITHUB_PERSONAL_ACCESS_TOKEN",
    "ghcr.io/github/github-mcp-server",
    "stdio",
    "--toolsets",
    "repos,issues,pull_requests,actions",
]
command = "docker"
enabled = false
required = false
startup_timeout_ms = 30000
tool_timeout_sec = 120

[mcp_servers.grafana]
args = [
    "run",
    "-i",
    "--rm",
    "-e",
    "GRAFANA_URL",
    "-e",
    "GRAFANA_USERNAME",
    "-e",
    "GRAFANA_PASSWORD",
    "-e",
    "GRAFANA_ORG_ID",
    "grafana/mcp-grafana",
    "-t",
    "stdio",
]
command = "docker"
required = false
startup_timeout_ms = 30000
tool_timeout_sec = 120

[mcp_servers.grafana.env]
GRAFANA_URL = "http://host.docker.internal:3400"
GRAFANA_USERNAME = "admin"
GRAFANA_PASSWORD = "admin"
GRAFANA_ORG_ID = "1"

[mcp_servers.postgres]
args = [
    "-y",
    "@modelcontextprotocol/server-postgres",
    "postgresql://botuser:botpass@127.0.0.1:56432/trading_bot",
]
command = "npx"
enabled = true
required = true
startup_timeout_ms = 20000

[mcp_servers.helius]
args = [
    "-y",
    "helius-mcp@latest",
]
command = "npx"
enabled = true
required = false
startup_timeout_ms = 30000

[mcp_servers.time]
args = ["mcp-server-time"]
command = "uvx"
required = true
startup_timeout_ms = 20000

[profiles.deep]
model_reasoning_effort = "high"

[profiles.review]
model = "gpt-5.4"
model_reasoning_effort = "high"

[shell_environment_policy]
inherit = "all"

[sandbox_workspace_write]
network_access = true

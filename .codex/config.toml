approval_policy = "never"
experimental_windows_sandbox = false
model = "gpt-5.4"
model_reasoning_effort = "medium"
project_doc_fallback_filenames = ["AGENTS.md"]
project_root_markers = [
    ".git",
]
sandbox_mode = "danger-full-access"
web_search = "cached"

[agents]
max_depth = 1
max_threads = 3

[mcp_servers.browsermcp]
args = ["-y", "@browsermcp/mcp"]
command = "npx"
required = false
startup_timeout_ms = 20000
tool_timeout_sec = 90

[mcp_servers.birdeye-mcp]
args = [".codex/scripts/start-birdeye-mcp.cjs"]
command = "node"
enabled = true
required = false
startup_timeout_ms = 30000
tool_timeout_sec = 45

[mcp_servers.chrome_devtools]
args = [
    "-y",
    "chrome-devtools-mcp@latest",
]
command = "npx"
required = false
startup_timeout_ms = 20000
tool_timeout_sec = 90

[mcp_servers.context7]
required = false
startup_timeout_ms = 20000
url = "https://mcp.context7.com/mcp"

[mcp_servers.desktop_commander]
args = [
    "-y",
    "@wonderwhy-er/desktop-commander@latest",
    "--no-onboarding",
]
command = "npx"
required = false
startup_timeout_ms = 30000
tool_timeout_sec = 120

[mcp_servers.fetch]
args = ["mcp-server-fetch"]
command = "uvx"
required = false
startup_timeout_ms = 20000

[mcp_servers.github]
args = [
    "run",
    "-i",
    "--rm",
    "-e",
    "GITHUB_PERSONAL_ACCESS_TOKEN",
    "ghcr.io/github/github-mcp-server",
    "stdio",
    "--toolsets",
    "repos,issues,pull_requests,actions",
]
command = "docker"
# Disabled by default in shared repo config.
# Verified broken on this Windows host because the current GitHub Docker stdio server
# speaks newline-delimited JSON instead of framed MCP stdio. macOS users can opt in
# locally by setting enabled = true after validating transport compatibility.
enabled = false
required = false

[mcp_servers.filesystem]
args = [".codex/scripts/start-filesystem-mcp.cjs"]
command = "node"
required = false

[mcp_servers.memory]
args = [
    "-y",
    "@modelcontextprotocol/server-memory",
]
command = "npx"
enabled = false
required = false
startup_timeout_ms = 20000

[mcp_servers.postgres]
args = [
    "-y",
    "@modelcontextprotocol/server-postgres",
    "postgresql://botuser:botpass@127.0.0.1:56432/trading_bot",
]
command = "npx"
enabled = true
required = true
startup_timeout_ms = 20000

[mcp_servers.helius]
args = [
    "-y",
    "helius-mcp@latest",
]
command = "npx"
enabled = true
required = false
startup_timeout_ms = 30000

[mcp_servers.sequential_thinking]
args = [
    "-y",
    "@modelcontextprotocol/server-sequential-thinking",
]
command = "npx"
required = false
startup_timeout_ms = 20000

[mcp_servers.time]
args = ["mcp-server-time"]
command = "uvx"
required = false
startup_timeout_ms = 20000

[profiles.deep]
model_reasoning_effort = "high"

[profiles.review]
model = "gpt-5.4"
model_reasoning_effort = "high"

[shell_environment_policy]
inherit = "all"

[shell_environment_policy.set]
CLAUDE_AUTOCOMPACT_PCT_OVERRIDE = "80"
MAX_THINKING_TOKENS = "10000"

approval_policy = "never"
experimental_windows_sandbox = false
model = "gpt-5.4"
model_reasoning_effort = "high"
project_doc_fallback_filenames = ["AGENTS.md"]
project_root_markers = [
    ".git",
]
sandbox_mode = "danger-full-access"
web_search = "cached"

[agents]
max_depth = 2
max_threads = 8

[mcp_servers.browsermcp]
args = ["-y", "@browsermcp/mcp"]
command = "npx"
required = false
startup_timeout_ms = 20000
tool_timeout_sec = 90

[mcp_servers.chrome_devtools]
args = [
    "-y",
    "chrome-devtools-mcp@latest",
]
command = "npx"
required = false
startup_timeout_ms = 20000
tool_timeout_sec = 90

[mcp_servers.context7]
required = false
startup_timeout_ms = 20000
url = "https://mcp.context7.com/mcp"

[mcp_servers.context7.env_http_headers]
CONTEXT7_API_KEY = "ctx7sk-2a57610c-16c7-4d54-a318-a3ba67eb05a0"

[mcp_servers.desktop_commander]
args = [
    "-y",
    "@wonderwhy-er/desktop-commander@latest",
    "--no-onboarding",
]
command = "npx"
required = false
startup_timeout_ms = 30000
tool_timeout_sec = 120

[mcp_servers.fetch]
args = ["mcp-server-fetch"]
command = "uvx"
required = false
startup_timeout_ms = 20000

[mcp_servers.filesystem]
args = [
    "-y",
    "@modelcontextprotocol/server-filesystem",
    "/Users/rukaiyahyusuf/Documents/Trading/bot-trading",
]
command = "npx"
cwd = "/Users/rukaiyahyusuf/Documents/Trading/bot-trading"
required = false

[mcp_servers.memory]
args = [
    "-y",
    "@modelcontextprotocol/server-memory",
]
command = "npx"
required = false
startup_timeout_ms = 20000

[mcp_servers.postgres]
args = [
    "-y",
    "@modelcontextprotocol/server-postgres",
    "postgresql://botuser:botpass@localhost:5432/trading_bot",
]
command = "npx"
enabled = true
required = false
startup_timeout_ms = 20000

[mcp_servers.sequential_thinking]
args = [
    "-y",
    "@modelcontextprotocol/server-sequential-thinking",
]
command = "npx"
required = false
startup_timeout_ms = 20000

[mcp_servers.serena]
required = false
startup_timeout_ms = 30000
url = "http://127.0.0.1:9121/mcp"

[mcp_servers.time]
args = ["mcp-server-time"]
command = "uvx"
required = false
startup_timeout_ms = 20000

[profiles.deep]
model_reasoning_effort = "high"

[profiles.review]
model = "gpt-5.4"
model_reasoning_effort = "high"

[shell_environment_policy]
inherit = "core"

[shell_environment_policy.set]
CLAUDE_AUTOCOMPACT_PCT_OVERRIDE = "80"
MAX_THINKING_TOKENS = "10000"

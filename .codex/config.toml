# Repo-local Codex template for this repository.
# Keep this file as the shared project default and the source of truth for the
# managed MCP block. If a session is missing the expected MCP servers, install or
# refresh the user-scoped block with:
#   node ./.codex/scripts/install-mcp-config.cjs
# Optional profiles:
#   codex --profile mini
#   codex --profile write
#   node ./.codex/scripts/install-mcp-config.cjs --profile db
#   node ./.codex/scripts/install-mcp-config.cjs --profile research
#   node ./.codex/scripts/install-mcp-config.cjs --profile dashboard
#   node ./.codex/scripts/install-mcp-config.cjs --profile provider
#   node ./.codex/scripts/install-mcp-config.cjs --profile full
# Then restart Codex so the refreshed MCP registry is loaded.
#
# Default policy: keep startup compact and day-to-day execution safe. Use explicit
# profiles when a task needs deeper reasoning or looser permissions.

approval_policy = "on-request"
model = "gpt-5.4"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"
personality = "pragmatic"
project_doc_fallback_filenames = ["AGENTS.md"]
project_root_markers = [
    ".git",
]
sandbox_mode = "workspace-write"
web_search = "cached"

[features]
codex_hooks = true

[windows]
sandbox = "elevated"

[agents]
max_depth = 1
max_threads = 3

[mcp_servers.birdeye-mcp]
args = [".codex/scripts/start-birdeye-mcp.cjs"]
command = "node"
# Disabled in shared repo config. This server needs a local BIRDEYE_API_KEY and a
# working host launcher; enable it locally after validating it on your machine.
enabled = false
required = false
startup_timeout_sec = 30
tool_timeout_sec = 45

[mcp_servers.chrome_devtools]
args = [
    ".codex/scripts/start-stdio-command.cjs",
    "npx",
    "-y",
    "chrome-devtools-mcp@latest",
]
command = "node"
enabled = false
required = false
startup_timeout_sec = 45
tool_timeout_sec = 90

[mcp_servers.context7]
enabled = false
required = false
startup_timeout_ms = 20000
url = "https://mcp.context7.com/mcp"

[mcp_servers.desktop_commander]
args = [".codex/scripts/start-desktop-commander.cjs"]
command = "node"
enabled = true
required = false
startup_timeout_ms = 90000
tool_timeout_sec = 120

[mcp_servers.fetch]
args = [".codex/scripts/start-stdio-command.cjs", "uvx", "mcp-server-fetch"]
command = "node"
enabled = false
required = false
startup_timeout_ms = 20000

[mcp_servers.postgres]
args = [
    ".codex/scripts/start-stdio-command.cjs",
    "npx",
    "-y",
    "@modelcontextprotocol/server-postgres",
    "postgresql://botuser:botpass@127.0.0.1:56432/trading_bot",
]
command = "node"
enabled = false
required = false
startup_timeout_ms = 20000

[mcp_servers.shadcn]
args = [
    ".codex/scripts/start-stdio-command.cjs",
    "npx",
    "-y",
    "shadcn@latest",
    "mcp",
]
command = "node"
enabled = false
required = false
startup_timeout_ms = 30000

[mcp_servers.helius]
args = [
    ".codex/scripts/start-stdio-command.cjs",
    "npx",
    "-y",
    "helius-mcp@latest",
]
command = "node"
enabled = false
required = false
startup_timeout_ms = 30000

[mcp_servers.time]
args = [".codex/scripts/start-stdio-command.cjs", "uvx", "mcp-server-time"]
command = "node"
enabled = false
required = false
startup_timeout_ms = 20000

[profiles.fast]
model_reasoning_effort = "low"

[profiles.mini]
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"

[profiles.write]
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"

[profiles.deep]
model_reasoning_effort = "high"

[profiles.review]
model = "gpt-5.4"
model_reasoning_effort = "high"
sandbox_mode = "read-only"

[profiles.full_access]
approval_policy = "never"
sandbox_mode = "danger-full-access"

[shell_environment_policy]
inherit = "all"

[shell_environment_policy.set]
CLAUDE_AUTOCOMPACT_PCT_OVERRIDE = "80"
MAX_THINKING_TOKENS = "10000"

# Repo-local Codex template for this repository.
# Current Codex CLI builds load MCP servers from ~/.codex/config.toml rather than
# this file directly. Install the managed repo MCP block with:
#   node ./.codex/scripts/install-mcp-config.cjs
# Optional profiles:
#   node ./.codex/scripts/install-mcp-config.cjs --profile db
#   node ./.codex/scripts/install-mcp-config.cjs --profile full
# Then restart Codex so the refreshed MCP registry is loaded.
#
# Default policy: keep startup compact. Only the primary local file tool should
# come up on fresh sessions unless the task clearly needs more.

approval_policy = "never"
experimental_windows_sandbox = false
model = "gpt-5.4"
model_reasoning_effort = "medium"
project_doc_fallback_filenames = ["AGENTS.md"]
project_root_markers = [
    ".git",
]
sandbox_mode = "danger-full-access"
web_search = "cached"

[agents]
max_depth = 1
max_threads = 3

[mcp_servers.browsermcp]
args = [".codex/scripts/start-stdio-command.cjs", "npx", "-y", "@browsermcp/mcp"]
command = "node"
enabled = false
required = false
startup_timeout_ms = 20000
tool_timeout_sec = 90

[mcp_servers.birdeye-mcp]
args = [".codex/scripts/start-birdeye-mcp.cjs"]
command = "node"
# Disabled in shared repo config. This server needs a local BIRDEYE_API_KEY and a
# working host launcher; enable it locally after validating it on your machine.
enabled = false
required = false
startup_timeout_sec = 30
tool_timeout_sec = 45

[mcp_servers.chrome_devtools]
args = [
    ".codex/scripts/start-stdio-command.cjs",
    "npx",
    "-y",
    "chrome-devtools-mcp@latest",
]
command = "node"
enabled = false
required = false
startup_timeout_sec = 45
tool_timeout_sec = 90

[mcp_servers.context7]
enabled = false
required = false
startup_timeout_ms = 20000
url = "https://mcp.context7.com/mcp"

[mcp_servers.desktop_commander]
args = [".codex/scripts/start-desktop-commander.cjs"]
command = "node"
required = false
startup_timeout_ms = 90000
tool_timeout_sec = 120

[mcp_servers.fetch]
args = [".codex/scripts/start-stdio-command.cjs", "uvx", "mcp-server-fetch"]
command = "node"
enabled = false
required = false
startup_timeout_ms = 20000

[mcp_servers.github]
args = [
    ".codex/scripts/start-stdio-command.cjs",
    "docker",
    "run",
    "-i",
    "--rm",
    "-e",
    "GITHUB_PERSONAL_ACCESS_TOKEN",
    "ghcr.io/github/github-mcp-server",
    "stdio",
    "--toolsets",
    "repos,issues,pull_requests,actions",
]
command = "node"
# Disabled by default in shared repo config.
# Verified broken on this Windows host because the current GitHub Docker stdio server
# speaks newline-delimited JSON instead of framed MCP stdio. macOS users can opt in
# locally by setting enabled = true after validating transport compatibility.
enabled = false
required = false

[mcp_servers.filesystem]
args = [".codex/scripts/start-filesystem-mcp.cjs"]
command = "node"
enabled = false
required = false

[mcp_servers.memory]
args = [
    ".codex/scripts/start-stdio-command.cjs",
    "npx",
    "-y",
    "@modelcontextprotocol/server-memory",
]
command = "node"
enabled = false
required = false
startup_timeout_ms = 20000

[mcp_servers.postgres]
args = [
    ".codex/scripts/start-stdio-command.cjs",
    "npx",
    "-y",
    "@modelcontextprotocol/server-postgres",
    "postgresql://botuser:botpass@127.0.0.1:56432/trading_bot",
]
command = "node"
enabled = false
required = false
startup_timeout_ms = 20000

[mcp_servers.helius]
args = [
    ".codex/scripts/start-stdio-command.cjs",
    "npx",
    "-y",
    "helius-mcp@latest",
]
command = "node"
enabled = false
required = false
startup_timeout_ms = 30000

[mcp_servers.sequential_thinking]
args = [
    ".codex/scripts/start-stdio-command.cjs",
    "npx",
    "-y",
    "@modelcontextprotocol/server-sequential-thinking",
]
command = "node"
enabled = false
required = false
startup_timeout_ms = 20000

[mcp_servers.time]
args = [".codex/scripts/start-stdio-command.cjs", "uvx", "mcp-server-time"]
command = "node"
enabled = false
required = false
startup_timeout_ms = 20000

[profiles.deep]
model_reasoning_effort = "high"

[profiles.review]
model = "gpt-5.4"
model_reasoning_effort = "high"

[shell_environment_policy]
inherit = "all"

[shell_environment_policy.set]
CLAUDE_AUTOCOMPACT_PCT_OVERRIDE = "80"
MAX_THINKING_TOKENS = "10000"

approval_policy = "never"
model = "gpt-5.4"
model_reasoning_effort = "medium"
personality = "pragmatic"
plan_mode_reasoning_effort = "high"
project_doc_fallback_filenames = ["AGENTS.md"]
project_root_markers = [".git"]
sandbox_mode = "danger-full-access"
web_search = "live"

[agents]
max_depth = 1
max_threads = 5

[features]
codex_hooks = false

[inline_tool_policy]
approve_query_patterns = [
    "git (status|diff|log|branch)",
    "git status",
    "npm run",
]
approve_read_patterns = [
    "Read",
    "Glob",
    "Grep",
    "list_directory",
]
deny_file_write_patterns = ["^(?!trading_bot/|notes/)"]
deny_shell_patterns = [
    "rm -rf",
    "dropdb",
    "git push --force",
]

[mcp_servers.birdeye-mcp]
args = [".codex/scripts/start-birdeye-mcp.cjs"]
command = "node"
enabled = true
required = false
startup_timeout_sec = 30
tool_timeout_sec = 45

[mcp_servers.chrome_devtools]
args = [
    ".codex/scripts/start-stdio-command.cjs",
    "npx",
    "-y",
    "chrome-devtools-mcp@latest",
]
command = "node"
enabled = false
required = false
startup_timeout_sec = 45
tool_timeout_sec = 90

[mcp_servers.context7]
enabled = false
required = false
startup_timeout_ms = 20000
url = "https://mcp.context7.com/mcp"

[mcp_servers.desktop_commander]
args = [".codex/scripts/start-desktop-commander.cjs"]
command = "node"
enabled = true
required = false
startup_timeout_ms = 90000
tool_timeout_sec = 120

[mcp_servers.desktop_commander.tools.start_process]
approval_mode = "approve"

[mcp_servers.fetch]
args = [
    ".codex/scripts/start-stdio-command.cjs",
    "uvx",
    "mcp-server-fetch",
]
command = "node"
enabled = false
required = false
startup_timeout_ms = 20000

[mcp_servers.firecrawl]
args = [".codex/scripts/start-firecrawl-mcp.cjs"]
command = "node"
enabled = false
required = false
startup_timeout_ms = 30000

[mcp_servers.helius]
args = [
    ".codex/scripts/start-stdio-command.cjs",
    "npx",
    "-y",
    "helius-mcp@latest",
]
command = "node"
enabled = false
required = false
startup_timeout_ms = 30000

[mcp_servers.postgres]
args = [
    ".codex/scripts/start-stdio-command.cjs",
    "npx",
    "-y",
    "@modelcontextprotocol/server-postgres",
    "postgresql://botuser:botpass@127.0.0.1:56432/trading_bot",
]
command = "node"
enabled = false
required = false
startup_timeout_ms = 20000

[mcp_servers.shadcn]
args = [
    ".codex/scripts/start-stdio-command.cjs",
    "npx",
    "-y",
    "shadcn@latest",
    "mcp",
]
command = "node"
enabled = false
required = false
startup_timeout_ms = 30000

[mcp_servers.time]
args = [
    ".codex/scripts/start-stdio-command.cjs",
    "uvx",
    "mcp-server-time",
]
command = "node"
enabled = false
required = false
startup_timeout_ms = 20000

[shell_environment_policy]
inherit = "all"

[shell_environment_policy.set]
CLAUDE_AUTOCOMPACT_PCT_OVERRIDE = "80"
MAX_THINKING_TOKENS = "10000"

[tools.bash]
timeout_ms = 60000

[windows]
sandbox = "elevated"

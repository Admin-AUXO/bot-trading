x-logging-defaults: &logging-defaults
  logging:
    driver: local
    options:
      max-size: "10m"
      max-file: "3"

x-app-defaults: &app-defaults
  <<: *logging-defaults
  init: true

services:
  postgres:
    <<: *logging-defaults
    image: postgres:16-alpine
    container_name: trading-postgres
    restart: unless-stopped
    shm_size: 128mb
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-botuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-botpass}
      POSTGRES_DB: ${POSTGRES_DB:-trading_bot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-botuser} -d ${POSTGRES_DB:-trading_bot}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    <<: *logging-defaults
    image: redis:7-alpine
    container_name: trading-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s

  db-setup:
    <<: *app-defaults
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: migrator
    restart: on-failure:3
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    <<: *app-defaults
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: trading-bot
    restart: unless-stopped
    stop_grace_period: 45s
    ports:
      - "${BOT_PORT:-3001}:${BOT_PORT:-3001}"
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
      db-setup:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:' + (process.env.BOT_PORT || 3001) + '/api/health').then((res) => {
            if (!res.ok) process.exit(1);
          }).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 6
      start_period: 20s

  dashboard:
    <<: *app-defaults
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: trading-dashboard
    restart: unless-stopped
    stop_grace_period: 20s
    ports:
      - "${DASHBOARD_PORT:-3000}:${DASHBOARD_PORT:-3000}"
    environment:
      API_URL: http://bot:${BOT_PORT:-3001}
      CONTROL_SECRET: ${CONTROL_API_SECRET}
      PORT: ${DASHBOARD_PORT:-3000}
    depends_on:
      bot:
        condition: service_healthy
        restart: true
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:' + (process.env.PORT || 3000)).then((res) => {
            if (!res.ok) process.exit(1);
          }).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  pgdata:
  redisdata:

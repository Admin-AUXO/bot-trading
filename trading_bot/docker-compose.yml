x-logging-defaults: &logging-defaults
  logging:
    driver: local
    options:
      max-size: "10m"
      max-file: "3"

services:
  postgres:
    <<: *logging-defaults
    image: postgres:16-alpine
    container_name: trading-postgres
    restart: unless-stopped
    shm_size: 128mb
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpass
      POSTGRES_DB: trading_bot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d trading_bot"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    <<: *logging-defaults
    image: redis:7-alpine
    container_name: trading-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  pgdata:
  redisdata:

x-logging-defaults: &logging-defaults
  logging:
    driver: local
    options:
      max-size: "10m"
      max-file: "3"

x-app-defaults: &app-defaults
  <<: *logging-defaults
  init: true

services:
  postgres:
    <<: *logging-defaults
    image: postgres:16-alpine
    container_name: trading-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-56432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-botuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-botpass}
      POSTGRES_DB: ${POSTGRES_DB:-trading_bot}
    volumes:
      - trading-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-botuser} -d ${POSTGRES_DB:-trading_bot}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  db-setup:
    <<: *app-defaults
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: migrator
    restart: on-failure:3
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    <<: *app-defaults
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: trading-bot
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "${BOT_PORT:-3101}:${BOT_PORT:-3101}"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:' + (process.env.BOT_PORT || 3101) + '/health').then((res) => {
            if (!res.ok) process.exit(1);
          }).catch(() => process.exit(1))"
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

  dashboard:
    <<: *app-defaults
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: trading-dashboard
    restart: unless-stopped
    stop_grace_period: 20s
    env_file:
      - ./dashboard/compose.env
    ports:
      - "${DASHBOARD_PORT:-3100}:3100"
    environment:
      API_URL: "http://bot:3101"
      DASHBOARD_PORT: 3100
      PORT: 3100
    depends_on:
      bot:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:' + (process.env.PORT || 3100)).then((res) => {
            if (!res.ok) process.exit(1);
          }).catch(() => process.exit(1))"
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

  grafana:
    <<: *app-defaults
    image: grafana/grafana:12.2.0
    container_name: trading-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3400}:3000"
    env_file:
      - ./grafana/compose.env
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- http://127.0.0.1:3000/api/health | grep -Eq '\"database\"[[:space:]]*:[[:space:]]*\"ok\"'",
        ]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

  obsidian:
    <<: *logging-defaults
    profiles: ["notes"]
    image: lscr.io/linuxserver/obsidian:1.12.4
    container_name: trading-obsidian
    restart: unless-stopped
    shm_size: "1gb"
    ports:
      - "127.0.0.1:${OBSIDIAN_HTTP_PORT:-3110}:3000"
      - "127.0.0.1:${OBSIDIAN_HTTPS_PORT:-3111}:3001"
    environment:
      PUID: ${OBSIDIAN_PUID:-1000}
      PGID: ${OBSIDIAN_PGID:-1000}
      TZ: ${OBSIDIAN_TZ:-Europe/London}
      TITLE: ${OBSIDIAN_TITLE:-bot-trading-notes}
      FILE_MANAGER_PATH: /config/vaults/bot-trading
    volumes:
      - obsidian-config:/config
      - ../notes:/config/vaults/bot-trading

volumes:
  trading-pgdata:
  grafana-data:
  obsidian-config:

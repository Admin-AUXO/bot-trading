interface:
  display_name: "Grafana Trading Dashboards"
  short_description: "Repo-specific Grafana analytics workflow"
  brand_color: "#F97316"
  default_prompt: "Use $grafana-trading-dashboards to extend this repo's Grafana analytics without cloning the Next.js dashboard."

dependencies:
  tools:
    - type: "mcp"
      value: "grafana-local"
      description: "Local Grafana MCP bridge for the repo's Dockerized Grafana stack"
      transport: "streamable_http"
      url: "http://127.0.0.1:3401"

policy:
  allow_implicit_invocation: true
